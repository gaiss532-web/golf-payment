# 배포: worker 폴더에서 npx wrangler deploy
# KV 네임스페이스 생성: npx wrangler kv namespace create BOOKINGS
# 생성된 id를 아래에 붙여넣기

name = "booking-api"
main = "src/index.js"
compatibility_date = "2024-10-22"

[[kv_namespaces]]
binding = "BOOKINGS"
# 아래 id 는 대시보드에서 KV 생성 후 붙이거나: npx wrangler kv namespace create BOOKINGS
id = "a9c3704363ae4a7ebbaff5ce07375b8e"

# 대시보드 또는 wrangler secret put 으로 설정:
# ADMIN_TOKEN              — 관리자 페이지에서 목록/확정 시 사용
# BOOKING_INGEST_SECRET    — PC_Control DB의 BOOKING_INGEST_SECRET과 동일
# HOME_SERVER_URL          — 예: https://your-domain:포트 (끝에 /api 없음)
# ALLOWED_ORIGIN           — 선택, Pages 도메인 (예: https://xxx.pages.dev). 비우면 *
# PORTONE_API_SECRET       — PortOne V2 API secret (test/prod)
# PORTONE_API_BASE         — 선택, 기본 https://api.portone.io
# PORTONE_WEBHOOK_SECRET   — 선택, 웹훅 서명 검증용(향후)
