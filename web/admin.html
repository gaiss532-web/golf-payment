<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>예약 관리 (확정)</title>
    <script>
        window.API_BASE = 'https://booking-api.ds1hjr.workers.dev';
    </script>
    <style>
        :root {
            --bg: #1a1d21;
            --card: #252a30;
            --text: #e8eaed;
            --muted: #9aa0a6;
            --border: #3c4043;
            --accent: #8ab4f8;
            --danger: #f28b82;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: ui-sans-serif, system-ui, sans-serif;
            font-size: 14px;
            color: var(--text);
            background: var(--bg);
            padding: 1.25rem;
        }
        h1 { font-size: 1.2rem; margin: 0 0 1rem; }
        .row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }
        input[type="password"], input[type="text"] {
            padding: 0.5rem 0.65rem;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            min-width: 200px;
        }
        button {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            border: none;
            background: var(--accent);
            color: #202124;
            font-weight: 600;
            cursor: pointer;
        }
        button.secondary { background: var(--border); color: var(--text); }
        button.danger { background: var(--danger); color: #202124; }
        .hint { color: var(--muted); font-size: 0.8rem; margin-top: 0.5rem; max-width: 36rem; }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1rem;
            margin-bottom: 0.75rem;
        }
        .card strong { color: var(--accent); }
        .meta { color: var(--muted); font-size: 0.8rem; margin-top: 0.35rem; }
        #log { white-space: pre-wrap; font-size: 0.75rem; color: var(--muted); margin-top: 1rem; }
    </style>
</head>
<body>
    <h1>대기 중인 예약</h1>
    <p class="hint">관리자 토큰은 Cloudflare Worker 시크릿 <code>ADMIN_TOKEN</code>과 같아야 합니다. 이 페이지 주소는 외부에 공유하지 마세요.</p>

    <div class="row">
        <label for="adminToken">관리자 토큰</label>
        <input type="password" id="adminToken" placeholder="ADMIN_TOKEN 입력" autocomplete="off">
        <button type="button" id="btnLoad">목록 새로고침</button>
    </div>

    <div id="list"></div>
    <div id="log"></div>

    <script>
        const base = () => (window.API_BASE || '').replace(/\/$/, '');

        function logLine(s) {
            const el = document.getElementById('log');
            el.textContent = new Date().toLocaleString() + ' ' + s + '\n' + el.textContent;
        }

        async function loadList() {
            const token = document.getElementById('adminToken').value.trim();
            const b = base();
            if (!b || b.indexOf('본인계정') !== -1) {
                alert('admin.html 상단 API_BASE를 Worker 주소로 수정하세요.');
                return;
            }
            if (!token) {
                alert('관리자 토큰을 입력하세요.');
                return;
            }
            const res = await fetch(b + '/api/bookings', {
                headers: { 'X-Admin-Token': token },
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
                document.getElementById('list').innerHTML = '<p class="hint">' + (data.error || '목록 실패') + '</p>';
                logLine('목록 실패 ' + res.status);
                return;
            }
            const wrap = document.getElementById('list');
            wrap.innerHTML = '';
            if (!data.bookings || data.bookings.length === 0) {
                wrap.innerHTML = '<p class="hint">대기 중인 신청이 없습니다.</p>';
                return;
            }
            for (const bk of data.bookings) {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML =
                    '<div><strong>' + escapeHtml(bk.customerName) + '</strong> · ' + escapeHtml(bk.customerPhone) + '</div>' +
                    '<div class="meta">' +
                    escapeHtml(bk.reserveDate) + ' ' + escapeHtml(bk.reserveTime) +
                    ' · ' + bk.partySize + '명' +
                    (bk.roomName ? ' · ' + escapeHtml(bk.roomName) : '') +
                    ' · ' + escapeHtml(bk.payMethod || '') +
                    '</div>' +
                    '<div class="meta">ID: ' + escapeHtml(bk.id) + '</div>' +
                    '<div class="row" style="margin-top:0.75rem;margin-bottom:0">' +
                    '<button type="button" class="danger" data-id="' + escapeHtml(bk.id) + '">확정하고 집 서버에 반영</button>' +
                    '</div>';
                wrap.appendChild(div);
            }
            wrap.querySelectorAll('button[data-id]').forEach((btn) => {
                btn.addEventListener('click', () => confirmOne(btn.getAttribute('data-id'), token));
            });
            logLine('목록 ' + data.bookings.length + '건');
        }

        function escapeHtml(s) {
            if (s == null) return '';
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        async function confirmOne(id, token) {
            if (!confirm('이 신청을 확정하고 집 PC 서버 예약 DB에 넣을까요?')) return;
            const b = base();
            const res = await fetch(b + '/api/bookings/' + encodeURIComponent(id) + '/confirm', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Admin-Token': token,
                },
                body: '{}',
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) {
                alert(data.error || '확정 실패: ' + res.status);
                logLine('확정 실패 ' + id + ' ' + res.status + ' ' + JSON.stringify(data));
                return;
            }
            alert(data.message || '완료');
            logLine('확정 OK ' + id + ' reservationId=' + (data.reservationId || ''));
            loadList();
        }

        document.getElementById('btnLoad').addEventListener('click', loadList);
    </script>
</body>
</html>
