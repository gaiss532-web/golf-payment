<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>무인 스크린골프 예약</title>
    <script src="https://cdn.portone.io/v2/browser-sdk.js"></script>
    <script>
        /* API용 Worker (Pages 주소와 다를 수 있음). 끝 슬래시 없이. */
        window.API_BASE = 'https://booking-api.ds1hjr.workers.dev';
        window.PORTONE_STORE_ID = 'store-8d4264c3-133c-4fcc-8e8a-dbc508357080';
        // PortOne V2 클라이언트 키 (test_ck_...)
        window.PORTONE_CHANNEL_KEY = 'test_ck_lpP2YxJ4K877JAdv7KX8RGZwXLOb';
    </script>
    <style>
        :root {
            --bg: #f4f6f8;
            --card: #fff;
            --text: #1a1a1a;
            --muted: #5c6570;
            --border: #e2e6ea;
            --accent: #0064ff;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 15px;
            line-height: 1.5;
            color: var(--text);
            background: var(--bg);
        }
        main {
            max-width: 480px;
            margin: 0 auto;
            padding: 2rem 1.25rem 3rem;
        }
        h1 {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 0 0 0.35rem;
        }
        .subtitle {
            color: var(--muted);
            font-size: 0.9rem;
            margin: 0 0 1.75rem;
        }
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
            border: 1px solid var(--border);
        }
        fieldset {
            border: 0;
            margin: 0 0 1.25rem;
            padding: 0;
        }
        fieldset:last-of-type { margin-bottom: 0; }
        legend, label {
            display: block;
            font-weight: 600;
            font-size: 0.8rem;
            margin-bottom: 0.4rem;
            color: var(--text);
        }
        input[type="text"],
        input[type="tel"],
        input[type="date"],
        input[type="time"],
        select {
            width: 100%;
            padding: 0.65rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            background: #fff;
        }
        input:focus, select:focus {
            outline: 2px solid rgba(0, 100, 255, .25);
            outline-offset: 1px;
        }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }
        @media (max-width: 400px) {
            .row-2 { grid-template-columns: 1fr; }
        }
        .pay-methods {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .pay-methods label {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            font-weight: 500;
            font-size: 0.95rem;
            margin: 0;
            cursor: pointer;
        }
        .pay-methods input { width: auto; margin: 0; }
        .hint {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 0.35rem;
        }
        #submit-button {
            width: 100%;
            margin-top: 1.25rem;
            padding: 0.85rem 1rem;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        #submit-button:hover { filter: brightness(1.05); }
        #submit-button:active { filter: brightness(0.95); }
        #submit-button:disabled { opacity: 0.6; cursor: not-allowed; }

        .banner {
            display: none;
            margin-bottom: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .banner.ok { display: block; background: #e8f5e9; color: #1b5e20; }
        .banner.err { display: block; background: #ffebee; color: #b71c1c; }

        footer.site-footer {
            margin-top: 3rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.8rem;
            line-height: 1.7;
        }
        footer.site-footer strong {
            color: var(--text);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <main>
        <h1>스크린골프 예약</h1>
        <p class="subtitle">예약 정보를 입력하고 PortOne TEST 결제를 진행합니다. 결제 완료 시 예약이 자동 접수됩니다.</p>

        <div id="msg" class="banner" role="status"></div>

        <div class="card">
            <form id="reservation-form" action="#" method="post" novalidate>
                <fieldset>
                    <label for="customerName">예약자 이름</label>
                    <input type="text" id="customerName" name="customerName" placeholder="홍길동" autocomplete="name" required>
                </fieldset>

                <fieldset>
                    <label for="customerPhone">예약자 휴대폰 번호</label>
                    <input type="tel" id="customerPhone" name="customerPhone" placeholder="010-0000-0000" inputmode="tel" autocomplete="tel" required>
                </fieldset>

                <div class="row-2">
                    <fieldset>
                        <label for="reserveDate">예약 날짜</label>
                        <input type="date" id="reserveDate" name="reserveDate" required>
                        <p class="hint">오늘 이전 날짜는 선택할 수 없습니다.</p>
                    </fieldset>
                    <fieldset>
                        <label for="reserveTime">예약 시간</label>
                        <input type="time" id="reserveTime" name="reserveTime" required>
                        <p class="hint">당일은 현재 시각 이전을 선택할 수 없습니다.</p>
                    </fieldset>
                </div>

                <fieldset>
                    <label for="partySize">인원</label>
                    <select id="partySize" name="partySize" required>
                        <option value="1">1명</option>
                        <option value="2">2명</option>
                        <option value="3">3명</option>
                        <option value="4">4명</option>
                    </select>
                </fieldset>

                <fieldset>
                    <label for="roomName">방 (선택)</label>
                    <select id="roomName" name="roomName">
                        <option value="">자동 (기본 방)</option>
                        <option value="1번방">1번방</option>
                        <option value="2번방">2번방</option>
                        <option value="3번방">3번방</option>
                        <option value="4번방">4번방</option>
                        <option value="5번방">5번방</option>
                        <option value="6번방">6번방</option>
                        <option value="7번방">7번방</option>
                        <option value="8번방">8번방</option>
                    </select>
                    <p class="hint">비워 두면 집 서버 설정의 기본 방으로 들어갑니다.</p>
                </fieldset>

                <fieldset>
                    <legend>결제수단</legend>
                    <div class="pay-methods">
                        <label><input type="radio" name="payMethod" value="카드" checked> 카드</label>
                        <label><input type="radio" name="payMethod" value="가상계좌"> 가상계좌(무통장입금)</label>
                    </div>
                </fieldset>

                <button type="button" id="submit-button">50,000원 결제하기</button>
            </form>
        </div>

        <footer class="site-footer" aria-label="사업자 정보">
            <p><strong>사업자명</strong> (주)케이써비스</p>
            <p><strong>사업자 등록번호</strong> 220-81-76739</p>
            <p><strong>대표자명</strong> 이난희</p>
        </footer>
    </main>

    <script>
        const reserveDate = document.getElementById('reserveDate');
        const reserveTime = document.getElementById('reserveTime');

        function pad2(n) { return String(n).padStart(2, '0'); }

        function todayLocalISO() {
            const d = new Date();
            return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
        }

        function nowLocalTimeHM() {
            const d = new Date();
            return pad2(d.getHours()) + ':' + pad2(d.getMinutes());
        }

        function syncDateTimeConstraints() {
            const minDay = todayLocalISO();
            reserveDate.min = minDay;
            if (reserveDate.value && reserveDate.value < minDay) {
                reserveDate.value = minDay;
            }

            const selectedDate = reserveDate.value || minDay;
            if (selectedDate === minDay) {
                const minT = nowLocalTimeHM();
                reserveTime.min = minT;
                if (reserveTime.value && reserveTime.value < minT) {
                    reserveTime.value = minT;
                }
            } else {
                reserveTime.removeAttribute('min');
            }
        }

        reserveDate.addEventListener('change', syncDateTimeConstraints);
        reserveTime.addEventListener('focus', syncDateTimeConstraints);
        document.addEventListener('visibilitychange', function () {
            if (!document.hidden) syncDateTimeConstraints();
        });
        syncDateTimeConstraints();
        if (!reserveDate.value) reserveDate.value = todayLocalISO();
        syncDateTimeConstraints();

        function selectedPayMethodLabel() {
            const r = document.querySelector('input[name="payMethod"]:checked');
            return r ? r.value : '카드';
        }
        function selectedPayMethodForPortOne() {
            return selectedPayMethodLabel() === '가상계좌' ? 'VIRTUAL_ACCOUNT' : 'CARD';
        }

        function validateBeforeSubmit() {
            syncDateTimeConstraints();
            const name = document.getElementById('customerName').value.trim();
            const phone = document.getElementById('customerPhone').value.trim();
            if (!name) { alert('예약자 이름을 입력해 주세요.'); return false; }
            if (!phone) { alert('휴대폰 번호를 입력해 주세요.'); return false; }
            if (!reserveDate.value) { alert('예약 날짜를 선택해 주세요.'); return false; }
            if (!reserveTime.value) { alert('예약 시간을 선택해 주세요.'); return false; }
            const minDay = todayLocalISO();
            if (reserveDate.value < minDay) {
                alert('예약 날짜는 오늘 이후만 선택할 수 있습니다.');
                return false;
            }
            if (reserveDate.value === minDay && reserveTime.value < nowLocalTimeHM()) {
                alert('당일 예약 시간은 현재 시각 이후만 선택할 수 있습니다.');
                return false;
            }
            return true;
        }

        function showMsg(text, ok) {
            const el = document.getElementById('msg');
            el.textContent = text;
            el.className = 'banner ' + (ok ? 'ok' : 'err');
        }

        document.getElementById('submit-button').addEventListener('click', async () => {
            if (!validateBeforeSubmit()) return;

            const base = (window.API_BASE || '').replace(/\/$/, '');
            if (!base || base.indexOf('본인계정') !== -1) {
                alert('index.html 상단의 API_BASE를 실제 Worker 주소로 수정해 주세요.');
                return;
            }

            const btn = document.getElementById('submit-button');
            btn.disabled = true;
            showMsg('', false);
            document.getElementById('msg').className = 'banner';

            try {
                const customerName = document.getElementById('customerName').value.trim();
                const customerPhone = document.getElementById('customerPhone').value.trim();
                const partySize = document.getElementById('partySize').value;
                const payMethodLabel = selectedPayMethodLabel();
                const payMethod = selectedPayMethodForPortOne();
                const roomSel = document.getElementById('roomName').value.trim();
                const totalAmount = 50000;
                const body = {
                    customerName: customerName,
                    customerPhone: customerPhone,
                    reserveDate: reserveDate.value,
                    reserveTime: reserveTime.value,
                    partySize: partySize,
                    payMethod: payMethodLabel,
                    totalAmount: totalAmount,
                };
                if (roomSel) body.roomName = roomSel;

                // 1) 예약 초안 생성 (bookingId, paymentId 발급)
                const draftRes = await fetch(base + '/api/bookings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const draft = await draftRes.json().catch(() => ({}));
                if (!draftRes.ok || !draft.bookingId || !draft.paymentId) {
                    showMsg(draft.error || '예약 생성에 실패했습니다.', false);
                    return;
                }

                const orderName = '스크린골프 예약 ' + reserveDate.value + ' ' + reserveTime.value + ' (' + partySize + '명)';
                const storeId = window.PORTONE_STORE_ID || '';
                if (!storeId) {
                    showMsg('PORTONE_STORE_ID가 설정되지 않았습니다.', false);
                    return;
                }

                // 2) PortOne 결제창 호출
                const req = {
                    storeId: storeId,
                    paymentId: draft.paymentId,
                    orderName: orderName,
                    totalAmount: totalAmount,
                    currency: 'CURRENCY_KRW',
                    payMethod: payMethod,
                    customer: {
                        fullName: customerName,
                        phoneNumber: customerPhone,
                    },
                    noticeUrls: [base + '/webhooks/portone'],
                };
                if (window.PORTONE_CHANNEL_KEY) req.channelKey = window.PORTONE_CHANNEL_KEY;

                const paymentResult = await PortOne.requestPayment(req);
                if (paymentResult && paymentResult.code) {
                    showMsg('결제가 취소되었거나 실패했습니다: ' + (paymentResult.message || paymentResult.code), false);
                    return;
                }

                const paidPaymentId = (paymentResult && paymentResult.paymentId) ? paymentResult.paymentId : draft.paymentId;

                // 3) Worker가 PortOne API 재조회 후 PC_Control 반영
                const completeRes = await fetch(base + '/api/payments/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        bookingId: draft.bookingId,
                        paymentId: paidPaymentId,
                    }),
                });
                const complete = await completeRes.json().catch(() => ({}));
                if (!completeRes.ok) {
                    showMsg(complete.error || '결제 확인에 실패했습니다.', false);
                    return;
                }
                if (complete.pending) {
                    showMsg(complete.message || '가상계좌 발급 완료. 입금 완료 후 자동 반영됩니다.', true);
                    return;
                }
                showMsg(complete.message || '결제가 확인되어 예약이 접수되었습니다.', true);
            } catch (e) {
                showMsg('오류: ' + e.message, false);
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
